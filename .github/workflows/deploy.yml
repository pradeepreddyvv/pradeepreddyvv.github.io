name: Inject secrets and deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject Web3Forms key into index.html
        env:
          WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}
        run: |
          set -euo pipefail
          test -n "$WEB3FORMS_KEY" || { echo "ERROR: Secret is empty"; exit 1; }

          python3 -c "
          import os, sys
          key = os.environ['WEB3FORMS_KEY'].strip()
          with open('index.html', 'r') as f:
              content = f.read()
          count = content.count('__WEB3FORMS_KEY__')
          if count == 0:
              print('ERROR: Placeholder not found in index.html')
              sys.exit(1)
          content = content.replace('__WEB3FORMS_KEY__', key)
          with open('index.html', 'w') as f:
              f.write(content)
          "
          if grep -q "__WEB3FORMS_KEY__" index.html; then
            echo "ERROR: Placeholder was NOT replaced!"
            exit 1
          fi
          echo "✅ Web3Forms key injected successfully"

      - name: Inject Supabase credentials into analytics.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          test -n "$SUPABASE_URL" || { echo "ERROR: SUPABASE_URL secret is empty"; exit 1; }
          test -n "$SUPABASE_ANON_KEY" || { echo "ERROR: SUPABASE_ANON_KEY secret is empty"; exit 1; }

          python3 -c "
          import os, sys

          url = os.environ['SUPABASE_URL'].strip()
          key = os.environ['SUPABASE_ANON_KEY'].strip()

          filepath = 'assets/js/analytics.js'
          with open(filepath, 'r') as f:
              content = f.read()

          if '__SUPABASE_URL__' not in content:
              print('ERROR: __SUPABASE_URL__ placeholder not found in analytics.js')
              sys.exit(1)
          if '__SUPABASE_ANON_KEY__' not in content:
              print('ERROR: __SUPABASE_ANON_KEY__ placeholder not found in analytics.js')
              sys.exit(1)

          content = content.replace('__SUPABASE_URL__', url)
          content = content.replace('__SUPABASE_ANON_KEY__', key)

          with open(filepath, 'w') as f:
              f.write(content)
          "
          if grep -q "__SUPABASE_URL__\|__SUPABASE_ANON_KEY__" assets/js/analytics.js; then
            echo "ERROR: Supabase placeholders were NOT replaced!"
            exit 1
          fi
          echo "✅ Supabase credentials injected successfully"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
